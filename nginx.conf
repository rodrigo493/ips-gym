server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
